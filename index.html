<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kharadar Scout Group Institute</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#eceef1;--panel:#fff;--ink:#15212e;--sub:#5b6b7b;--line:#dde3e9;--soft:#f4f6f8;
    --primary:#0d6e63;--primaryDark:#0a574e;--amber:#b45309;--gold:#caa23a;
    --activeBg:#e7f3f0;--activeText:#0a574e;--offBg:#f0f1f3;--offText:#6b7785;
    --danger:#b42318;--dangerBg:#fdecea;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:1120px;margin:0 auto;padding:18px 16px 80px}
  h1{font-size:21px;margin:0;line-height:1.1}h2{font-size:18px;margin:0}h3{font-size:16px;margin:0 0 14px}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;color:var(--ink);background:#fff;outline:none;font-family:inherit}
  .input:focus{border-color:var(--primary)} .input:disabled{background:var(--soft);color:var(--sub)}
  select.input{cursor:pointer}
  .lab{font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:5px}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);font-family:inherit}
  .btn-primary{background:var(--primary);color:#fff;border:none}.btn-danger{background:var(--danger);color:#fff;border:none}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .pill{border-radius:20px;padding:2px 10px;font-size:12.5px;font-weight:600;white-space:nowrap;display:inline-block}
  .tabbar{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:16px 0 20px;overflow-x:auto}
  .tab{display:flex;align-items:center;gap:7px;background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
  .tab.on{color:var(--primary);border-bottom-color:var(--primary)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{background:var(--soft);color:var(--sub);text-align:left;padding:11px 13px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
  td{padding:10px 13px;border-top:1px solid var(--line)}
  .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .scrollx{overflow-x:auto}
  .icon-btn{background:none;border:none;cursor:pointer;padding:6px;font-size:15px;line-height:1}
  .grid{display:grid;gap:12px}
  .modal-bg{position:fixed;inset:0;background:rgba(20,33,46,.45);display:grid;place-items:center;padding:16px;z-index:60}
  .modal{background:#fff;border-radius:14px;width:100%;max-height:90vh;overflow-y:auto;padding:22px}
  .muted{color:var(--sub);font-size:12.5px}
  .stat-h{display:flex;align-items:center;gap:8px;color:var(--sub);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .stat-v{font-size:26px;font-weight:700;margin-top:4px}
  .badge-row{display:flex;gap:6px;margin-bottom:6px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;z-index:90}
  .tagwrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .tag{background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:3px 8px 3px 11px;font-size:13px;display:inline-flex;align-items:center;gap:5px}
  .lead{width:42px;height:42px;border-radius:11px;background:var(--primary);display:grid;place-items:center;color:#fff;font-size:22px;flex-shrink:0}
  .rank-no{width:26px;height:26px;border-radius:50%;color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
  .banner{background:#fff7e6;border:1px solid #f0d59a;color:#7a5b12;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px}
  .authwrap{min-height:100vh;display:grid;place-items:center;padding:20px}
</style>
</head>
<body>
<div id="app"><div class="wrap"><p class="muted">Loading…</p></div></div>
<script>
/* ============================================================
   STEP 1 — paste your Supabase project values here (Settings → API)
   ============================================================ */
const SUPABASE_URL  = "https://odeeeqijahjqgrozptgk.supabase.co";
const SUPABASE_ANON = "sb_publishable_6SOmSq9XCSH-tokEoZTnbg_DMhhordC";
/* ============================================================ */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ----------------------------- model ---------------------------------- */
const SECTIONS=[
  {name:"Shaheen",min:7,max:11,group:"Parwaz",indiv:"Shaheen",color:"#0d6e63"},
  {name:"Boy Scout",min:12,max:17,group:"Patrol",indiv:"Scout",color:"#2563a6"},
  {name:"Rover",min:17,max:25,group:"Patrol",indiv:"Rover",color:"#8a4fb0"},
];
const MEMBER_TYPES=["Scout","Leader","Senior Leader"];
const LEADER_ROLES=["GSL","Section Leader","Finance Member","Secretary","Assistant Leader"];
const sectionMeta=n=>SECTIONS.find(s=>s.name===n)||{color:"#5b6b7b",group:"Group",indiv:"Member"};

let state={institution:"",association:"",patrols:{},rankBadges:{},proficiencyBadges:[],members:[],sessions:{},activities:{}};
let currentUser=null,currentRole="scout",canEdit=false,tab="dash";

/* ----------------------------- helpers -------------------------------- */
const $=s=>document.querySelector(s);
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function ageFrom(dob){if(!dob)return null;const d=new Date(dob);if(isNaN(d))return null;const t=new Date();let a=t.getFullYear()-d.getFullYear();const m=t.getMonth()-d.getMonth();if(m<0||(m===0&&t.getDate()<d.getDate()))a--;return a;}
function lastSunday(){const t=new Date();const s=new Date(t);s.setDate(t.getDate()-t.getDay());return s.toISOString().slice(0,10);}
function nextSunday(){const t=new Date();const s=new Date(t);const d=t.getDay();s.setDate(t.getDate()+((7-d)%7));return s.toISOString().slice(0,10);}
function fmtDate(s){return s?new Date(s).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"—";}
function nextId(){let m=0;state.members.forEach(x=>{const n=parseInt(String(x.id).replace(/\D/g,""),10);if(!isNaN(n)&&n>m)m=n;});return"KSG-"+String(m+1).padStart(4,"0");}
function uid(){return Date.now()+"."+Math.floor(Math.random()*1e6);}
function toast(t){let e=document.createElement("div");e.className="toast";e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),2200);}
function download(text,name,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

/* ----------------------------- data i/o ------------------------------- */
async function loadAll(){
  const {data,error}=await sb.from("registry").select("key,value");
  if(error){toast("Load error: "+error.message);return;}
  const map={};(data||[]).forEach(r=>map[r.key]=r.value);
  const c=map.config||{};
  state={
    institution:c.institution||"Kharadar Scout Group Institute",
    association:c.association||"Ismaili District Boy Scout Association",
    patrols:c.patrols||{Shaheen:[],"Boy Scout":[],Rover:[]},
    rankBadges:c.rankBadges||{Shaheen:[],"Boy Scout":[],Rover:[]},
    proficiencyBadges:c.proficiencyBadges||[],
    members:map.members||[],
    sessions:map.sessions||{},
    activities:map.activities||{},
  };
}
async function saveMembers(){const{error}=await sb.from("registry").upsert({key:"members",value:state.members});if(error)toast("Save failed: "+error.message);}
async function saveSessions(){const{error}=await sb.from("registry").upsert({key:"sessions",value:state.sessions});if(error)toast("Save failed: "+error.message);}
async function saveActivities(){const{error}=await sb.from("registry").upsert({key:"activities",value:state.activities});if(error)toast("Save failed: "+error.message);}
async function saveConfig(){const cfg={institution:state.institution,association:state.association,patrols:state.patrols,rankBadges:state.rankBadges,proficiencyBadges:state.proficiencyBadges};const{error}=await sb.from("registry").upsert({key:"config",value:cfg});if(error)toast("Save failed: "+error.message);}

/* ============================== auth =================================== */
async function boot(){
  if(SUPABASE_URL.includes("PASTE_")){$("#app").innerHTML=`<div class="wrap"><div class="card"><h3>Almost there</h3><p>Open this file and paste your Supabase <b>Project URL</b> and <b>anon key</b> near the top of the script (Step 1), then reload.</p></div></div>`;return;}
  const {data:{session}}=await sb.auth.getSession();
  if(session&&session.user){currentUser=session.user;await afterLogin();}else renderAuth();
}
function renderAuth(mode){
  mode=mode||"login";
  $("#app").innerHTML=`<div class="authwrap"><div class="card" style="width:340px">
    <div class="lead" style="margin:0 auto 14px">🛡️</div>
    <h2 style="text-align:center">Kharadar Scout Group</h2>
    <p class="muted" style="text-align:center;margin:6px 0 16px">${mode==="login"?"Log in to continue.":"Create your account."}</p>
    <div class="grid" style="gap:10px">
      ${mode==="signup"?`<label><span class="lab">Full name</span><input id="aName" class="input"/></label>`:""}
      <label><span class="lab">Email</span><input id="aEmail" class="input" type="email"/></label>
      <label><span class="lab">Password</span><input id="aPass" class="input" type="password"/></label>
      <button class="btn btn-primary" id="aGo" style="justify-content:center">${mode==="login"?"Log in":"Sign up"}</button>
      <div class="muted" style="text-align:center">
        ${mode==="login"?`No account? <a href="#" id="toSignup">Sign up</a>`:`Have an account? <a href="#" id="toLogin">Log in</a>`}
      </div>
    </div></div></div>`;
  if($("#toSignup"))$("#toSignup").onclick=e=>{e.preventDefault();renderAuth("signup");};
  if($("#toLogin"))$("#toLogin").onclick=e=>{e.preventDefault();renderAuth("login");};
  $("#aGo").onclick=async()=>{
    const email=$("#aEmail").value.trim(),pass=$("#aPass").value;
    if(!email||!pass)return toast("Email and password required");
    $("#aGo").disabled=true;
    if(mode==="signup"){
      const name=$("#aName").value.trim();
      const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
      $("#aGo").disabled=false;
      if(error)return toast(error.message);
      if(data.session){currentUser=data.session.user;await afterLogin();}
      else toast("Account created. If email confirmation is on, confirm then log in.");
    }else{
      const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
      $("#aGo").disabled=false;
      if(error)return toast(error.message);
      currentUser=data.user;await afterLogin();
    }
  };
}
async function afterLogin(){
  const{data:prof}=await sb.from("profiles").select("role,full_name").eq("id",currentUser.id).single();
  currentRole=(prof&&prof.role)||"scout";canEdit=currentRole==="leader";
  currentUser.full_name=(prof&&prof.full_name)||"";
  await loadAll();tab="dash";renderApp();
}
async function logout(){await sb.auth.signOut();currentUser=null;renderAuth();}

/* ============================== shell ================================= */
function renderApp(){
  const tabs=[["dash","🏕️ Dashboard"],["members","👥 Members"],["sessions","✅ Attendance & Marks"],["board","🏆 Leaderboard"],["planner","🗓️ Sunday Planner"]];
  if(canEdit)tabs.push(["settings","⚙️ Settings"]);
  $("#app").innerHTML=`<div class="wrap">
    <div class="row" style="justify-content:space-between;margin-bottom:6px">
      <div class="row" style="gap:12px"><div class="lead">🛡️</div>
        <div><h1>${esc(state.institution)}</h1><div class="muted">${esc(state.association)}</div></div></div>
      <div class="row" style="gap:8px">
        <span class="pill" style="background:${canEdit?"var(--activeBg)":"var(--offBg)"};color:${canEdit?"var(--activeText)":"var(--offText)"}">${canEdit?"Leader":"Scout · view only"}</span>
        <button class="btn" id="logoutBtn">Log out</button>
      </div>
    </div>
    <div class="tabbar" id="tabbar">${tabs.map(([id,l])=>`<button class="tab ${tab===id?"on":""}" data-tab="${id}">${l}</button>`).join("")}</div>
    <div id="content"></div></div>`;
  $("#logoutBtn").onclick=logout;
  $("#tabbar").querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;renderApp();});
  ({dash:renderDash,members:renderMembers,sessions:renderSessions,board:renderBoard,planner:renderPlanner,settings:renderSettings}[tab]||renderDash)();
}

/* ============================== dashboard ============================= */
function renderDash(){
  const scouts=state.members.filter(m=>m.memberType==="Scout");
  const leaders=state.members.filter(m=>m.memberType!=="Scout");
  const dates=[...new Set(Object.values(state.sessions).map(s=>s.date))].sort();
  const latest=dates[dates.length-1];
  const stat=(l,v,c)=>`<div class="card"><div class="stat-h"><span style="color:${c||"var(--primary)"}">●</span>${l}</div><div class="stat-v">${v}</div></div>`;
  let winners="";
  if(latest){winners=SECTIONS.map(s=>{
    const sess=state.sessions[latest+"|"+s.name];if(!sess)return"";
    const rows=Object.entries(sess.records).map(([k,v])=>({m:state.members.find(x=>x._k==k),...v})).filter(r=>r.m&&r.m.memberType==="Scout");
    const ts=[...rows].sort((a,b)=>(b.points||0)-(a.points||0))[0];
    const bp={};rows.forEach(r=>{const p=r.m.patrol||"—";bp[p]=(bp[p]||0)+(Number(r.points)||0);});
    const tp=Object.entries(bp).sort((a,b)=>b[1]-a[1])[0];
    return`<div style="border:1px solid var(--line);border-radius:10px;padding:12px">
      <div style="font-weight:700;color:${s.color};margin-bottom:6px">${s.name}</div>
      <div style="font-size:13px">⭐ Best ${s.indiv}: <b>${esc(ts&&ts.m?ts.m.name:"—")}</b> ${ts?`(${ts.points||0})`:""}</div>
      <div style="font-size:13px;margin-top:4px">🏅 Best ${s.group}: <b>${esc(tp?tp[0]:"—")}</b> ${tp?`(${tp[1]})`:""}</div></div>`;
  }).join("");}
  $("#content").innerHTML=`
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:16px">
      ${stat("Total members",state.members.length)}${stat("Scouts",scouts.length,"var(--primary)")}
      ${stat("Leaders",leaders.length,"var(--amber)")}${stat("Sessions held",Object.keys(state.sessions).length,"var(--sub)")}</div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin-bottom:16px">
      ${SECTIONS.map(s=>{const n=scouts.filter(m=>m.section===s.name).length;return`
        <div class="card" style="border-top:3px solid ${s.color}">
          <div class="row" style="justify-content:space-between">
            <div><div style="font-weight:700;font-size:16px">${s.name}</div><div class="muted">Age ${s.min}–${s.max} · ${s.group}s</div></div>
            <div style="font-size:28px;font-weight:700;color:${s.color}">${n}</div></div>
          <div class="muted" style="margin-top:8px">${(state.patrols[s.name]||[]).length} ${s.group.toLowerCase()}s</div></div>`;}).join("")}</div>
    <div class="card"><div style="font-weight:700;margin-bottom:10px">🏆 Latest Sunday — ${latest?fmtDate(latest):"no sessions yet"}</div>
      ${latest?`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))">${winners}</div>`:`<div class="muted">No sessions recorded yet.</div>`}</div>`;
}

/* =============================== members ============================== */
let mSearch="",mFSec="All",mFType="All";
function filteredMembers(){const q=mSearch.trim().toLowerCase();
  return state.members.filter(m=>mFSec==="All"||m.section===mFSec).filter(m=>mFType==="All"||m.memberType===mFType)
    .filter(m=>!q||[m.name,m.id,m.email,m.contact,m.patrol].some(v=>String(v||"").toLowerCase().includes(q)))
    .sort((a,b)=>String(a.name).localeCompare(String(b.name)));}
function membersRows(){const list=filteredMembers();
  if(!list.length)return`<tr><td colspan="8" style="text-align:center;color:var(--sub);padding:40px">${state.members.length?"No matches.":"No members yet."}</td></tr>`;
  return list.map(m=>{const age=m.dob?ageFrom(m.dob):m.manualAge;const meta=sectionMeta(m.section);
    return`<tr>
      <td class="mono" style="font-size:12.5px;color:var(--primaryDark)">${esc(m.id)}</td>
      <td style="font-weight:600"><a href="#" data-view="${m._k}" style="color:var(--ink);text-decoration:none;border-bottom:1px dotted var(--line)">${esc(m.name)}</a>${m.memberType!=="Scout"?` <span class="pill" style="background:var(--soft);color:var(--amber)">${esc(m.memberType)}</span>`:""}</td>
      <td><span style="color:${meta.color};font-weight:600">${esc(m.section)}</span></td>
      <td style="color:var(--sub)">${esc(m.memberType==="Scout"?(m.patrol||"—"):(m.role||"—"))}</td>
      <td style="color:var(--sub)">${age==null?"—":age}</td>
      <td style="color:var(--sub);white-space:nowrap">🏅 ${(m.rankBadges||[]).length} &nbsp; 🎖️ ${(m.proficiencyBadges||[]).length}</td>
      <td><span class="pill" style="background:${m.status==="Active"?"var(--activeBg)":"var(--offBg)"};color:${m.status==="Active"?"var(--activeText)":"var(--offText)"}">${esc(m.status)}</span></td>
      <td style="text-align:right;white-space:nowrap">${canEdit?`<button class="icon-btn" data-edit="${m._k}">✏️</button><button class="icon-btn" data-del="${m._k}">🗑️</button>`:""}</td></tr>`;}).join("");}
function renderMembers(){
  $("#content").innerHTML=`
    <div class="row" style="margin-bottom:14px">
      <input id="mSearch" class="input" style="flex:1;min-width:200px" placeholder="Search name, ID, contact, patrol…" value="${esc(mSearch)}"/>
      <select id="mFSec" class="input" style="width:auto"><option>All</option>${SECTIONS.map(s=>`<option ${mFSec===s.name?"selected":""}>${s.name}</option>`).join("")}</select>
      <select id="mFType" class="input" style="width:auto"><option>All</option>${MEMBER_TYPES.map(t=>`<option ${mFType===t?"selected":""}>${t}</option>`).join("")}</select>
      ${canEdit?`<button class="btn btn-primary" id="addM">＋ Add</button>`:""}
    </div>
    <div class="tablewrap scrollx"><table><thead><tr>${["ID","Name","Section","Patrol / Role","Age","Badges","Status",""].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
    <tbody id="mBody">${membersRows()}</tbody></table></div>`;
  $("#mSearch").oninput=e=>{mSearch=e.target.value;$("#mBody").innerHTML=membersRows();wireRows();};
  $("#mFSec").onchange=e=>{mFSec=e.target.value;$("#mBody").innerHTML=membersRows();wireRows();};
  $("#mFType").onchange=e=>{mFType=e.target.value;$("#mBody").innerHTML=membersRows();wireRows();};
  if($("#addM"))$("#addM").onclick=()=>openMember(null);
  wireRows();
}
function wireRows(){
  $("#mBody").querySelectorAll("[data-view]").forEach(a=>a.onclick=e=>{e.preventDefault();openMemberView(state.members.find(m=>m._k==a.dataset.view));});
  if(!canEdit)return;
  $("#mBody").querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openMember(state.members.find(m=>m._k==b.dataset.edit)));
  $("#mBody").querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>confirmDel(state.members.find(m=>m._k==b.dataset.del)));}

function memberStats(m){let pts=0,present=0,held=0;Object.values(state.sessions).forEach(s=>{const r=s.records&&s.records[m._k];if(r){held++;pts+=Number(r.points)||0;if(r.present)present++;}});return{pts,present,held,pct:held?Math.round(present/held*100):null};}
function openMemberView(m){
  if(!m)return;const age=m.dob?ageFrom(m.dob):m.manualAge;const meta=sectionMeta(m.section);const st=memberStats(m);
  const badgeList=(arr,empty)=>arr&&arr.length?arr.map(b=>`<div class="row" style="justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--line)"><span>${esc(b.name||"—")}</span><span class="muted">${b.date?fmtDate(b.date):""}</span></div>`).join(""):`<div class="muted" style="padding:4px 0">${empty}</div>`;
  const fieldRow=(l,v)=>`<div class="row" style="justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line)"><span class="muted">${l}</span><span style="font-weight:600">${esc(v||"—")}</span></div>`;
  const bg=document.createElement("div");bg.className="modal-bg";
  bg.innerHTML=`<div class="modal" style="max-width:520px">
    <div class="row" style="justify-content:space-between;align-items:flex-start">
      <div><h2>${esc(m.name)}</h2><div class="muted mono" style="margin-top:2px">${esc(m.id)}</div></div>
      <button class="icon-btn" id="vx">✕</button></div>
    <div class="row" style="gap:8px;margin:12px 0">
      <span class="pill" style="background:var(--soft);color:${meta.color}">${esc(m.section)}</span>
      <span class="pill" style="background:var(--soft);color:var(--amber)">${esc(m.memberType==="Scout"?(m.patrol||"Scout"):(m.role||m.memberType))}</span>
      <span class="pill" style="background:${m.status==="Active"?"var(--activeBg)":"var(--offBg)"};color:${m.status==="Active"?"var(--activeText)":"var(--offText)"}">${esc(m.status)}</span></div>
    <div class="grid" style="grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">

        <label><span class="lab">Contact</span><input class="input" data-f="contact" value="${esc(f.contact)}"/></label></div>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:13px">

        :`<label><span class="lab">Leadership role</span><select class="input" data-f="role"><option value="">— select —</option>${LEADER_ROLES.map(r=>`<option ${f.role===r?"selected":""}>${r}</option>`).join("")}</select></label>`}

function badgeRows(field){const arr=mform[field]||[];const dl=document.getElementById("dl_"+field)?"dl_"+field:"";

function confirmDel(m){const bg=document.createElement("div");bg.className="modal-bg";

/* ========================== attendance/marks ========================= */
let sDate=lastSunday(),sSec="Shaheen",sDraft={};
function scoutRoster(){return state.members.filter(m=>m.memberType==="Scout"&&m.section===sSec&&m.status==="Active").sort((a,b)=>String(a.patrol).localeCompare(String(b.patrol))||String(a.name).localeCompare(String(b.name)));}
function leaderRoster(){return state.members.filter(m=>m.memberType!=="Scout"&&m.section===sSec&&m.status==="Active").sort((a,b)=>String(a.name).localeCompare(String(b.name)));}
function renderSessions(){
  const scouts=scoutRoster(),leaders=leaderRoster(),all=[...scouts,...leaders];
  const existing=state.sessions[sDate+"|"+sSec];
  sDraft={};all.forEach(m=>{const r=existing&&existing.records[m._k];sDraft[m._k]={present:r?r.present:true,points:r?r.points:""};});
  const presBtn=m=>`<button class="btn pres" data-pk="${m._k}" ${canEdit?"":"disabled"} style="padding:5px 13px;font-size:13px"></button>`;
  const scoutRow=m=>`<tr><td style="font-weight:600">${esc(m.name)}</td><td style="color:var(--sub)">${esc(m.patrol||"—")}</td>
    <td>${presBtn(m)}</td><td><input class="input" type="number" data-mk="${m._k}" placeholder="0" style="width:80px;padding:6px 9px" value="${sDraft[m._k].points}" ${canEdit?"":"disabled"}/></td></tr>`;
  const leaderRow=m=>`<tr><td style="font-weight:600">${esc(m.name)} <span class="pill" style="background:var(--soft);color:var(--amber)">${esc(m.role||m.memberType)}</span></td>
    <td style="color:var(--sub)">${esc(m.memberType)}</td><td>${presBtn(m)}</td><td style="color:var(--sub)">—</td></tr>`;
  const subhead=t=>`<tr><td colspan="4" style="background:var(--soft);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--sub)">${t}</td></tr>`;
  let body="";
  if(scouts.length)body+=subhead("Scouts")+scouts.map(scoutRow).join("");
  if(leaders.length)body+=subhead("Leaders")+leaders.map(leaderRow).join("");
  $("#content").innerHTML=`
    ${canEdit?"":`<div class="banner">You're signed in as a Scout — this is view-only. Only leaders can record attendance and marks.</div>`}
    <div class="card row" style="align-items:flex-end;margin-bottom:14px">
      <label><span class="lab">Sunday date</span><input id="sD" class="input" type="date" value="${sDate}"/></label>
      <label><span class="lab">Section</span><select id="sS" class="input">${SECTIONS.map(s=>`<option ${sSec===s.name?"selected":""}>${s.name}</option>`).join("")}</select></label>
      <div style="flex:1"></div><div class="muted" id="sCount"></div>
      ${canEdit?`<button class="btn btn-primary" id="sSave">💾 Save session</button>`:""}</div>
    ${all.length?`<div class="tablewrap scrollx"><table><thead><tr>${["Name","Patrol / Type","Present","Marks"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${body}</tbody></table></div>`
      :`<div class="card" style="text-align:center;color:var(--sub);padding:40px">No active members in ${sSec}.</div>`}
    <div class="muted" style="margin-top:10px">Scouts' marks feed the leaderboard. Leaders are tracked for attendance only.</div>`;
  const refresh=()=>{const p=Object.values(sDraft).filter(v=>v.present).length;$("#sCount").textContent=`${p}/${all.length} present`+(existing?" · saved":"");};
  const paint=()=>{$("#content").querySelectorAll(".pres").forEach(b=>{const on=sDraft[b.dataset.pk].present;b.textContent=on?"Present":"Absent";b.style.background=on?"var(--activeBg)":"var(--offBg)";b.style.color=on?"var(--activeText)":"var(--offText)";b.style.border="none";});};
  $("#sD").onchange=e=>{sDate=e.target.value;renderSessions();};
  $("#sS").onchange=e=>{sSec=e.target.value;renderSessions();};
  if(canEdit){
    $("#content").querySelectorAll(".pres").forEach(b=>b.onclick=()=>{sDraft[b.dataset.pk].present=!sDraft[b.dataset.pk].present;paint();refresh();});
    $("#content").querySelectorAll("[data-mk]").forEach(i=>i.oninput=()=>{sDraft[i.dataset.mk].points=i.value;});
    $("#sSave").onclick=async()=>{const records={};Object.entries(sDraft).forEach(([k,v])=>{records[k]={present:!!v.present,points:Number(v.points)||0};});state.sessions[sDate+"|"+sSec]={date:sDate,section:sSec,records};await saveSessions();toast("Session saved");renderSessions();};
  }
  paint();refresh();
}

/* ============================ leaderboard ============================ */
let bSec="Shaheen",bFrom="",bTo="";
function renderBoard(){
  const sessions=Object.values(state.sessions).filter(s=>s.section===bSec).filter(s=>(!bFrom||s.date>=bFrom)&&(!bTo||s.date<=bTo));
  const scouts=state.members.filter(m=>m.memberType==="Scout"&&m.section===bSec);
  const stat=scouts.map(m=>{let pts=0,pres=0;sessions.forEach(s=>{const r=s.records[m._k];if(r){pts+=Number(r.points)||0;if(r.present)pres++;}});return{m,pts,pres,held:sessions.length};});
  const bestScouts=[...stat].sort((a,b)=>b.pts-a.pts);
  const pa={};(state.patrols[bSec]||[]).forEach(p=>pa[p]={pts:0,count:0});
  stat.forEach(r=>{const p=r.m.patrol;if(!p)return;(pa[p]=pa[p]||{pts:0,count:0});pa[p].pts+=r.pts;pa[p].count++;});
  const bestPatrols=Object.entries(pa).map(([name,v])=>({name,...v})).sort((a,b)=>b.pts-a.pts);
  const rc=i=>["#caa23a","#9aa3ad","#c08457"][i]||"var(--line)";
  const row=(i,name,sub,val)=>`<div class="row" style="gap:12px;padding:9px 10px"><div class="rank-no" style="background:${rc(i)}">${i+1}</div><div style="flex:1;min-width:0"><div style="font-weight:600">${esc(name)}</div><div class="muted">${esc(sub)}</div></div><div style="font-weight:700;font-size:18px;color:var(--primaryDark)">${val}</div></div>`;
  const empty=`<div class="muted" style="text-align:center;padding:26px">No marks recorded for this range.</div>`;
  $("#content").innerHTML=`
    <div class="row" style="align-items:flex-end;margin-bottom:16px">
      <label><span class="lab">Section</span><select id="bS" class="input">${SECTIONS.map(s=>`<option ${bSec===s.name?"selected":""}>${s.name}</option>`).join("")}</select></label>
      <label><span class="lab">From</span><input id="bF" class="input" type="date" value="${bFrom}"/></label>
      <label><span class="lab">To</span><input id="bT" class="input" type="date" value="${bTo}"/></label>
      <div class="muted" style="padding-bottom:9px">${sessions.length} session(s)</div></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr))">
      <div class="tablewrap"><div style="padding:13px 16px;border-bottom:1px solid var(--line);font-weight:700">⭐ Best ${sectionMeta(bSec).indiv}</div><div style="padding:8px">${bestScouts.length?bestScouts.map((r,i)=>row(i,r.m.name,`${r.m.patrol||"—"} · present ${r.pres}/${r.held}`,r.pts)).join(""):empty}</div></div>
      <div class="tablewrap"><div style="padding:13px 16px;border-bottom:1px solid var(--line);font-weight:700">🏅 Best ${sectionMeta(bSec).group}</div><div style="padding:8px">${bestPatrols.some(p=>p.count)?bestPatrols.map((p,i)=>row(i,p.name,`${p.count} scout(s)`,p.pts)).join(""):empty}</div></div></div>`;
  $("#bS").onchange=e=>{bSec=e.target.value;renderBoard();};
  $("#bF").onchange=e=>{bFrom=e.target.value;renderBoard();};
  $("#bT").onchange=e=>{bTo=e.target.value;renderBoard();};
}

      ${canEdit?`<button class="btn btn-primary" id="pAdd">＋ Add activity</button>`:""}</div>
    ${(function(){
      if(!items.length)return `<div class="card" style="text-align:center;color:var(--sub);padding:36px">No activities planned for ${fmtDate(pDate)} yet.${canEdit?" Click “Add activity”.":""}</div>`;
      const card=it=>`<div class="card" style="border-left:3px solid ${secColor(it.section)}">
        <div class="row" style="justify-content:space-between;align-items:flex-start">
          <div style="min-width:0"><div class="row" style="gap:8px">
            ${it.time?`<span class="mono" style="font-weight:700">${esc(it.time)}</span>`:""}
            <span style="font-weight:700">${esc(it.title)}</span></div>
            ${it.detail?`<div style="margin-top:6px;font-size:13px">${esc(it.detail)}</div>`:""}
            ${it.lead?`<div class="muted" style="margin-top:4px">In charge: ${esc(it.lead)}</div>`:""}</div>
          ${canEdit?`<div style="white-space:nowrap"><button class="icon-btn" data-pe="${it.id}">✏️</button><button class="icon-btn" data-pd="${it.id}">🗑️</button></div>`:""}
        </div></div>`;
      const block=(label,color,list)=>list.length?`<div style="margin:4px 0 8px;font-weight:700;color:${color}">${label}</div><div class="grid" style="gap:10px;margin-bottom:18px">${list.map(card).join("")}</div>`:"";
      let out=block("🎯 Group activity — all sections","var(--amber)",items.filter(it=>!it.section||it.section==="All"));
      SECTIONS.forEach(s=>{out+=block(s.name,s.color,items.filter(it=>it.section===s.name));});
      return out;
    })()}
    ${upcoming.length?`<div class="muted" style="margin-top:14px">Other planned Sundays: ${upcoming.map(d=>`<a href="#" data-jump="${d}">${fmtDate(d)}</a>`).join(" · ")}</div>`:""}`;
  $("#pD").onchange=e=>{pDate=e.target.value;renderPlanner();};
  $("#content").querySelectorAll("[data-jump]").forEach(a=>a.onclick=e=>{e.preventDefault();pDate=a.dataset.jump;renderPlanner();});
  if(canEdit){
    if($("#pAdd"))$("#pAdd").onclick=()=>openActivity(null);
    $("#content").querySelectorAll("[data-pe]").forEach(b=>b.onclick=()=>openActivity(plannerItems().find(x=>x.id==b.dataset.pe)));
    $("#content").querySelectorAll("[data-pd]").forEach(b=>b.onclick=async()=>{const d=state.activities[pDate];d.items=d.items.filter(x=>x.id!=b.dataset.pd);if(!d.items.length)delete state.activities[pDate];await saveActivities();renderPlanner();toast("Removed");});
  }
}
function openActivity(it){
  const isEdit=!!it;const f=it?{...it}:{id:uid(),time:"",title:"",detail:"",lead:"",section:"All"};
  const bg=document.createElement("div");bg.className="modal-bg";
  bg.innerHTML=`<div class="modal" style="max-width:480px">
    <div class="row" style="justify-content:space-between"><h2>${isEdit?"Edit activity":"Add activity"}</h2><button class="icon-btn" id="ax">✕</button></div>
    <div class="grid" style="gap:13px;margin-top:14px">
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:13px">
        <label><span class="lab">Time</span><input class="input" id="aTime" type="time" value="${esc(f.time)}"/></label>
        <label><span class="lab">Section</span><select class="input" id="aSec"><option ${f.section==="All"?"selected":""}>All</option>${SECTIONS.map(s=>`<option ${f.section===s.name?"selected":""}>${s.name}</option>`).join("")}</select></label></div>
      <label><span class="lab">Activity *</span><input class="input" id="aTitle" value="${esc(f.title)}" placeholder="e.g. Knot-tying relay"/></label>
      <label><span class="lab">Details</span><textarea class="input" id="aDetail" style="min-height:60px;resize:vertical">${esc(f.detail)}</textarea></label>
      <label><span class="lab">In charge (leader)</span><input class="input" id="aLead" value="${esc(f.lead)}"/></label></div>
    <div class="row" style="justify-content:flex-end;margin-top:18px"><button class="btn" id="ac">Cancel</button><button class="btn btn-primary" id="as">💾 Save</button></div></div>`;
  document.body.appendChild(bg);bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.querySelector("#ax").onclick=()=>bg.remove();bg.querySelector("#ac").onclick=()=>bg.remove();
  bg.querySelector("#as").onclick=async()=>{
    const v={id:f.id,time:bg.querySelector("#aTime").value,title:bg.querySelector("#aTitle").value.trim(),detail:bg.querySelector("#aDetail").value,lead:bg.querySelector("#aLead").value,section:bg.querySelector("#aSec").value};
    if(!v.title)return toast("Activity name is required");
    const d=state.activities[pDate]||{date:pDate,items:[]};
    d.items=isEdit?d.items.map(x=>x.id===v.id?v:x):[...d.items,v];
    state.activities[pDate]=d;await saveActivities();bg.remove();renderPlanner();toast("Saved");
  };
}

/* ============================== boot ================================= */
boot();
</script>
</body>
</html>
