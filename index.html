<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kharadar Scout Group Institute</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f3f0f9;--panel:#ffffff;--ink:#241a33;--sub:#6f6880;--line:#e7ddf3;--soft:#f7f3fc;
    --primary:#6a34a9;--primaryDark:#4e2681;--amber:#8a5cc4;--gold:#c8992f;
    --activeBg:#eee2fa;--activeText:#4e2681;--offBg:#f1eef6;--offText:#6f6880;
    --danger:#b42318;--dangerBg:#fdecea;
  }
  body{background:var(--bg)}
  .layout{display:flex;min-height:100vh}
  .sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,#3d1d63,#2a1445);color:#e9e2f5;display:flex;flex-direction:column;padding:16px 14px;position:sticky;top:0;height:100vh}
  .brand{display:flex;gap:10px;align-items:center;margin-bottom:16px}
  .brand-title{font-weight:700;font-size:15px;color:#fff;line-height:1.15}
  .brand-sub{font-size:11px;color:#b9a9d6}
  .nav{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto}
  .navbtn{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:#d8ccec;background:none;border:none;cursor:pointer;font-size:14px;font-weight:600;text-align:left;width:100%;font-family:inherit}
  .navbtn:hover{background:rgba(255,255,255,.08)}
  .navbtn.on{background:#7a45c9;color:#fff;box-shadow:0 3px 10px rgba(122,69,201,.4)}
  .nav-ico{width:20px;text-align:center;font-size:15px}
  .side-div{height:1px;background:rgba(255,255,255,.12);margin:12px 0}
  .side-user{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;color:#e9e2f5;margin-bottom:10px}
  .side-logout{width:100%;background:#fff;color:#2c1548;border:none;border-radius:10px;padding:9px;font-weight:700;cursor:pointer;font-family:inherit}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg)}
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
  .page-title{font-size:19px;font-weight:700;margin:0}
  .content-outer{padding:22px 24px 70px;max-width:1120px;width:100%;margin:0 auto}
  .hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink);padding:0 4px}
  .scrim{display:none}
  @media(max-width:820px){
    .sidebar{position:fixed;left:0;top:0;z-index:60;transform:translateX(-100%);transition:transform .25s ease}
    .sidebar.open{transform:translateX(0)}
    .hamburger{display:block}
    .scrim.show{display:block;position:fixed;inset:0;background:rgba(20,10,40,.45);z-index:55}
    .content-outer{padding:16px 14px 70px}
    .topbar{padding:12px 14px}
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:1120px;margin:0 auto;padding:18px 16px 80px}
  h1{font-size:21px;margin:0;line-height:1.1}h2{font-size:18px;margin:0}h3{font-size:16px;margin:0 0 14px}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(74,35,120,.05)}
  .input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;color:var(--ink);background:#fff;outline:none;font-family:inherit}
  .input:focus{border-color:var(--primary)} .input:disabled{background:var(--soft);color:var(--sub)}
  select.input{cursor:pointer}
  .lab{font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:5px}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);font-family:inherit}
  .btn-primary{background:var(--primary);color:#fff;border:none}.btn-danger{background:var(--danger);color:#fff;border:none}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .pill{border-radius:20px;padding:2px 10px;font-size:12.5px;font-weight:600;white-space:nowrap;display:inline-block}
  .tabbar{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:16px 0 20px;overflow-x:auto}
  .tab{display:flex;align-items:center;gap:7px;background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
  .tab.on{color:var(--primary);border-bottom-color:var(--primary)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{background:var(--soft);color:var(--sub);text-align:left;padding:11px 13px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
  td{padding:10px 13px;border-top:1px solid var(--line)}
  .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .scrollx{overflow-x:auto}
  .icon-btn{background:none;border:none;cursor:pointer;padding:6px;font-size:15px;line-height:1}
  .grid{display:grid;gap:12px}
  .modal-bg{position:fixed;inset:0;background:rgba(20,33,46,.45);display:grid;place-items:center;padding:16px;z-index:60}
  .modal{background:#fff;border-radius:14px;width:100%;max-height:90vh;overflow-y:auto;padding:22px}
  .muted{color:var(--sub);font-size:12.5px}
  .stat-h{display:flex;align-items:center;gap:8px;color:var(--sub);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .stat-v{font-size:26px;font-weight:700;margin-top:4px}
  .badge-row{display:flex;gap:6px;margin-bottom:6px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;z-index:90}
  .tagwrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .tag{background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:3px 8px 3px 11px;font-size:13px;display:inline-flex;align-items:center;gap:5px}
  .lead{width:42px;height:42px;border-radius:11px;background:var(--primary);display:grid;place-items:center;color:#fff;font-size:22px;flex-shrink:0}
  .rank-no{width:26px;height:26px;border-radius:50%;color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
  .banner{background:#fff7e6;border:1px solid #f0d59a;color:#7a5b12;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px}
  .authwrap{min-height:100vh;display:grid;place-items:center;padding:20px}
</style>
</head>

let state={institution:"",association:"",patrols:{},rankBadges:{},proficiencyBadges:[],members:[],sessions:{},activities:{},attendanceBonus:2,gslEmail:"",feeMonthly:{Shaheen:20,"Boy Scout":50,Rover:100},fees:{},resources:[],programs:[]};

];}
let currentUser=null,currentRole="scout",canEdit=false,tab="dash";
function canDelete(){return canEdit&&currentUser&&state.gslEmail&&(currentUser.email||"").toLowerCase()===String(state.gslEmail).toLowerCase();}

/* ----------------------------- helpers -------------------------------- */
const $=s=>document.querySelector(s);
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function ageFrom(dob){if(!dob)return null;const d=new Date(dob);if(isNaN(d))return null;const t=new Date();let a=t.getFullYear()-d.getFullYear();const m=t.getMonth()-d.getMonth();if(m<0||(m===0&&t.getDate()<d.getDate()))a--;return a;}
function lastSunday(){const t=new Date();const s=new Date(t);s.setDate(t.getDate()-t.getDay());return s.toISOString().slice(0,10);}
function nextSunday(){const t=new Date();const s=new Date(t);const d=t.getDay();s.setDate(t.getDate()+((7-d)%7));return s.toISOString().slice(0,10);}
function fmtDate(s){return s?new Date(s).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"—";}
function nextId(exceptKey){const taken=new Set(state.members.filter(m=>m._k!==exceptKey).map(m=>String(m.id)));let m=0;state.members.forEach(x=>{const n=parseInt(String(x.id).replace(/\D/g,""),10);if(!isNaN(n)&&n>m)m=n;});let n,cand;n=m;do{n++;cand="KSG-"+String(n).padStart(4,"0");}while(taken.has(cand));return cand;}
function uid(){return Date.now()+"."+Math.floor(Math.random()*1e6);}
function toast(t){let e=document.createElement("div");e.className="toast";e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),2200);}
function download(text,name,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function confirmBox(title,msg,onYes,yesLabel,danger){const bg=document.createElement("div");bg.className="modal-bg";
  bg.innerHTML=`<div class="modal" style="max-width:400px;text-align:center"><div style="font-size:26px;margin-bottom:6px">${danger?"🗑️":"❓"}</div><h3>${esc(title)}</h3><p class="muted" style="margin:6px 0 18px">${esc(msg)}</p><div class="row" style="justify-content:center"><button class="btn" id="cbno">Cancel</button><button class="btn ${danger?"btn-danger":"btn-primary"}" id="cbyes">${esc(yesLabel||"Confirm")}</button></div></div>`;
  document.body.appendChild(bg);bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.querySelector("#cbno").onclick=()=>bg.remove();
  bg.querySelector("#cbyes").onclick=async()=>{await onYes();bg.remove();};}

/* ----------------------------- data i/o ------------------------------- */
async function loadAll(){
  const {data,error}=await sb.from("registry").select("key,value");
  if(error){toast("Load error: "+error.message);return;}
  const map={};(data||[]).forEach(r=>map[r.key]=r.value);
  const c=map.config||{};
  state={
    institution:c.institution||"Kharadar Scout Group Institute",
    association:c.association||"Ismaili District Boy Scout Association",
    patrols:c.patrols||{Shaheen:[],"Boy Scout":[],Rover:[]},
    rankBadges:c.rankBadges||{Shaheen:[],"Boy Scout":[],Rover:[]},
    proficiencyBadges:c.proficiencyBadges||[],
    attendanceBonus:c.attendanceBonus!=null?c.attendanceBonus:2,
    gslEmail:c.gslEmail||"",
    feeMonthly:c.feeMonthly||{Shaheen:20,"Boy Scout":50,Rover:100},
    members:map.members||[],
    sessions:map.sessions||{},
    activities:map.activities||{},
    fees:map.fees||{},
    resources:map.resources!==undefined?map.resources:defaultResources(),
    programs:map.programs||[],
  };
}
async function saveMembers(){const{error}=await sb.from("registry").upsert({key:"members",value:state.members});if(error)toast("Save failed: "+error.message);}
async function saveSessions(){const{error}=await sb.from("registry").upsert({key:"sessions",value:state.sessions});if(error)toast("Save failed: "+error.message);}
async function saveActivities(){const{error}=await sb.from("registry").upsert({key:"activities",value:state.activities});if(error)toast("Save failed: "+error.message);}
async function saveFees(){const{error}=await sb.from("registry").upsert({key:"fees",value:state.fees});if(error)toast("Save failed: "+error.message);}
async function savePrograms(){const{error}=await sb.from("registry").upsert({key:"programs",value:state.programs});if(error)toast("Save failed: "+error.message);}
async function saveResources(){const{error}=await sb.from("registry").upsert({key:"resources",value:state.resources});if(error)toast("Save failed: "+error.message);}
async function saveConfig(){const cfg={institution:state.institution,association:state.association,patrols:state.patrols,rankBadges:state.rankBadges,proficiencyBadges:state.proficiencyBadges,attendanceBonus:state.attendanceBonus,gslEmail:state.gslEmail,feeMonthly:state.feeMonthly};const{error}=await sb.from("registry").upsert({key:"config",value:cfg});if(error)toast("Save failed: "+error.message);}

/* ============================== auth =================================== */
async function boot(){
  if(SUPABASE_URL.includes("PASTE_")){$("#app").innerHTML=`<div class="wrap"><div class="card"><h3>Almost there</h3><p>Open this file and paste your Supabase <b>Project URL</b> and <b>anon key</b> near the top of the script (Step 1), then reload.</p></div></div>`;return;}
  const {data:{session}}=await sb.auth.getSession();
  if(session&&session.user){currentUser=session.user;await afterLogin();}else renderAuth();
}
function renderAuth(mode){
  mode=mode||"login";
  $("#app").innerHTML=`<div class="authwrap"><div class="card" style="width:340px">
    <img src="${LOGO_DATA}" alt="ISGK" style="width:96px;height:96px;border-radius:16px;background:#fff;object-fit:contain;padding:3px;margin:0 auto 14px;display:block;box-shadow:0 4px 16px rgba(78,38,129,.2)"/>
    <h2 style="text-align:center">Kharadar Scout Group</h2>
    <p class="muted" style="text-align:center;margin:6px 0 16px">${mode==="login"?"Log in to continue.":"Create your account."}</p>
    <div class="grid" style="gap:10px">
      ${mode==="signup"?`<label><span class="lab">Full name</span><input id="aName" class="input"/></label>`:""}
      <label><span class="lab">Email</span><input id="aEmail" class="input" type="email"/></label>
      <label><span class="lab">Password</span><input id="aPass" class="input" type="password"/></label>
      <button class="btn btn-primary" id="aGo" style="justify-content:center">${mode==="login"?"Log in":"Sign up"}</button>
      <div class="muted" style="text-align:center">
        ${mode==="login"?`No account? <a href="#" id="toSignup">Sign up</a>`:`Have an account? <a href="#" id="toLogin">Log in</a>`}
      </div>
    </div></div></div>`;
  if($("#toSignup"))$("#toSignup").onclick=e=>{e.preventDefault();renderAuth("signup");};
  if($("#toLogin"))$("#toLogin").onclick=e=>{e.preventDefault();renderAuth("login");};
  $("#aGo").onclick=async()=>{
    const email=$("#aEmail").value.trim(),pass=$("#aPass").value;
    if(!email||!pass)return toast("Email and password required");
    $("#aGo").disabled=true;
    if(mode==="signup"){
      const name=$("#aName").value.trim();
      const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
      $("#aGo").disabled=false;
      if(error)return toast(error.message);
      if(data.session){currentUser=data.session.user;await afterLogin();}
      else toast("Account created. If email confirmation is on, confirm then log in.");
    }else{
      const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
      $("#aGo").disabled=false;
      if(error)return toast(error.message);
      currentUser=data.user;await afterLogin();
    }
  };
}
async function afterLogin(){
  const{data:prof}=await sb.from("profiles").select("role,full_name").eq("id",currentUser.id).single();
  currentRole=(prof&&prof.role)||"scout";canEdit=currentRole==="leader";
  currentUser.full_name=(prof&&prof.full_name)||"";
  await loadAll();tab="dash";renderApp();
}
async function logout(){await sb.auth.signOut();currentUser=null;renderAuth();}

/* ============================== dashboard ============================= */
function renderDash(){
  const scouts=state.members.filter(m=>m.memberType==="Scout");
  const leaders=state.members.filter(m=>m.memberType!=="Scout");
  const dates=[...new Set(Object.values(state.sessions).map(s=>s.date))].sort();
  const latest=dates[dates.length-1];
  const stat=(l,v,c)=>`<div class="card"><div class="stat-h"><span style="color:${c||"var(--primary)"}">●</span>${l}</div><div class="stat-v">${v}</div></div>`;
  let winners="";
  if(latest){winners=SECTIONS.map(s=>{
    const sess=state.sessions[latest+"|"+s.name];if(!sess)return"";
    const rows=Object.entries(sess.records).map(([k,v])=>({m:state.members.find(x=>x._k==k),...v})).filter(r=>r.m&&r.m.memberType==="Scout");
    const bonus=Number(state.attendanceBonus)||0;
    const ts=[...rows].map(r=>({...r,score:(Number(r.points)||0)+(r.present?bonus:0)})).sort((a,b)=>b.score-a.score)[0];
    const pp=sess.patrolPoints||{};
    const tp=Object.entries(pp).sort((a,b)=>b[1]-a[1])[0];
    return`<div style="border:1px solid var(--line);border-radius:10px;padding:12px">
      <div style="font-weight:700;color:${s.color};margin-bottom:6px">${s.name}</div>
      <div style="font-size:13px">⭐ Best ${s.indiv}: <b>${esc(ts&&ts.m?ts.m.name:"—")}</b> ${ts?`(${ts.score})`:""}</div>
      <div style="font-size:13px;margin-top:4px">🏅 Best ${s.group}: <b>${esc(tp?tp[0]:"—")}</b> ${tp?`(${tp[1]})`:""}</div></div>`;
  }).join("");}
  $("#content").innerHTML=`
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:16px">
      ${stat("Total members",state.members.length)}${stat("Scouts",scouts.length,"var(--primary)")}
      ${stat("Leaders",leaders.length,"var(--amber)")}${stat("Sessions held",Object.keys(state.sessions).length,"var(--sub)")}</div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin-bottom:16px">
      ${SECTIONS.map(s=>{const n=scouts.filter(m=>m.section===s.name).length;return`
        <div class="card" style="border-top:3px solid ${s.color}">
          <div class="row" style="justify-content:space-between">
            <div><div style="font-weight:700;font-size:16px">${s.name}</div><div class="muted">Age ${s.min}–${s.max} · ${s.group}s</div></div>
            <div style="font-size:28px;font-weight:700;color:${s.color}">${n}</div></div>
          <div class="muted" style="margin-top:8px">${(state.patrols[s.name]||[]).length} ${s.group.toLowerCase()}s</div></div>`;}).join("")}</div>
    <div class="card"><div style="font-weight:700;margin-bottom:10px">🏆 Latest Sunday — ${latest?fmtDate(latest):"no sessions yet"}</div>
      ${latest?`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))">${winners}</div>`:`<div class="muted">No sessions recorded yet.</div>`}</div>`;
}

/* =============================== members ============================== */
let mSearch="",mFSec="All",mFType="All";
function filteredMembers(){const q=mSearch.trim().toLowerCase();
  return state.members.filter(m=>mFSec==="All"||m.section===mFSec).filter(m=>mFType==="All"||m.memberType===mFType)
    .filter(m=>!q||[m.name,m.id,m.email,m.contact,m.patrol].some(v=>String(v||"").toLowerCase().includes(q)))
    .sort((a,b)=>String(a.name).localeCompare(String(b.name)));}
function membersRows(){const list=filteredMembers();
  if(!list.length)return`<tr><td colspan="8" style="text-align:center;color:var(--sub);padding:40px">${state.members.length?"No matches.":"No members yet."}</td></tr>`;
  return list.map(m=>{const age=m.dob?ageFrom(m.dob):m.manualAge;const meta=sectionMeta(m.section);
    return`<tr>
      <td class="mono" style="font-size:12.5px;color:var(--primaryDark)">${esc(m.id)}</td>
      <td style="font-weight:600"><a href="#" data-view="${m._k}" style="color:var(--ink);text-decoration:none;border-bottom:1px dotted var(--line)">${esc(m.name)}</a>${m.memberType!=="Scout"?` <span class="pill" style="background:var(--soft);color:var(--amber)">${esc(m.memberType)}</span>`:""}</td>
      <td><span style="color:${meta.color};font-weight:600">${esc(m.section)}</span></td>
      <td style="color:var(--sub)">${esc(m.memberType==="Scout"?(m.patrol||"—"):(m.role||"—"))}</td>
      <td style="color:var(--sub)">${age==null?"—":age}</td>
      <td style="color:var(--sub);white-space:nowrap">🏅 ${(m.rankBadges||[]).length} &nbsp; 🎖️ ${(m.proficiencyBadges||[]).length}</td>
      <td><span class="pill" style="background:${m.status==="Active"?"var(--activeBg)":"var(--offBg)"};color:${m.status==="Active"?"var(--activeText)":"var(--offText)"}">${esc(m.status)}</span></td>
      <td style="text-align:right;white-space:nowrap">${canEdit?`<button class="icon-btn" data-edit="${m._k}">✏️</button>`:""}${canDelete()?`<button class="icon-btn" data-del="${m._k}">🗑️</button>`:""}</td></tr>`;}).join("");}
function renderMembers(){
  $("#content").innerHTML=`
    <div class="row" style="margin-bottom:14px">
      <input id="mSearch" class="input" style="flex:1;min-width:200px" placeholder="Search name, ID, contact, patrol…" value="${esc(mSearch)}"/>
      <select id="mFSec" class="input" style="width:auto"><option>All</option>${SECTIONS.map(s=>`<option ${mFSec===s.name?"selected":""}>${s.name}</option>`).join("")}</select>
      <select id="mFType" class="input" style="width:auto"><option>All</option>${MEMBER_TYPES.map(t=>`<option ${mFType===t?"selected":""}>${t}</option>`).join("")}</select>
      ${canEdit?`<button class="btn btn-primary" id="addM">＋ Add</button>`:""}
    </div>
    <div class="tablewrap scrollx"><table><thead><tr>${["ID","Name","Section","Patrol / Role","Age","Badges","Status",""].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
    <tbody id="mBody">${membersRows()}</tbody></table></div>`;
  $("#mSearch").oninput=e=>{mSearch=e.target.value;$("#mBody").innerHTML=membersRows();wireRows();};
  $("#mFSec").onchange=e=>{mFSec=e.target.value;$("#mBody").innerHTML=membersRows();wireRows();};
  $("#mFType").onchange=e=>{mFType=e.target.value;$("#mBody").innerHTML=membersRows();wireRows();};

function wireRows(){
  $("#mBody").querySelectorAll("[data-view]").forEach(a=>a.onclick=e=>{e.preventDefault();openMemberView(state.members.find(m=>m._k==a.dataset.view));});
  if(!canEdit)return;
  $("#mBody").querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openMember(state.members.find(m=>m._k==b.dataset.edit)));
  $("#mBody").querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>confirmDel(state.members.find(m=>m._k==b.dataset.del)));}

function memberStats(m){const bonus=Number(state.attendanceBonus)||0;let marks=0,present=0,held=0;Object.values(state.sessions).forEach(s=>{const r=s.records&&s.records[m._k];if(r){held++;marks+=Number(r.points)||0;if(r.present)present++;}});const pts=marks+present*bonus;return{pts,marks,bonusTotal:present*bonus,present,held,pct:held?Math.round(present/held*100):null};}
function openMemberView(m){
  if(!m)return;const age=m.dob?ageFrom(m.dob):m.manualAge;const meta=sectionMeta(m.section);const st=memberStats(m);
  const badgeList=(arr,empty)=>arr&&arr.length?arr.map(b=>`<div class="row" style="justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--line)"><span>${esc(b.name||"—")}</span><span class="muted">${b.date?fmtDate(b.date):""}</span></div>`).join(""):`<div class="muted" style="padding:4px 0">${empty}</div>`;
  const fieldRow=(l,v)=>`<div class="row" style="justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line)"><span class="muted">${l}</span><span style="font-weight:600">${esc(v||"—")}</span></div>`;
  const bg=document.createElement("div");bg.className="modal-bg";
  bg.innerHTML=`<div class="modal" style="max-width:520px">
    <div class="row" style="justify-content:space-between;align-items:flex-start">
      <div><h2>${esc(m.name)}</h2><div class="muted mono" style="margin-top:2px">${esc(m.id)}</div></div>
      <button class="icon-btn" id="vx">✕</button></div>
    <div class="row" style="gap:8px;margin:12px 0">
      <span class="pill" style="background:var(--soft);color:${meta.color}">${esc(m.section)}</span>
      <span class="pill" style="background:var(--soft);color:var(--amber)">${esc(m.memberType==="Scout"?(m.patrol||"Scout"):(m.role||m.memberType))}</span>
      <span class="pill" style="background:${m.status==="Active"?"var(--activeBg)":"var(--offBg)"};color:${m.status==="Active"?"var(--activeText)":"var(--offText)"}">${esc(m.status)}</span></div>
    <div class="grid" style="grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="card" style="text-align:center;padding:12px"><div class="stat-v" style="font-size:22px">${st.pts}</div><div class="muted">Total marks</div></div>
      <div class="card" style="text-align:center;padding:12px"><div class="stat-v" style="font-size:22px">${st.pct==null?"—":st.pct+"%"}</div><div class="muted">Attendance</div></div>
      <div class="card" style="text-align:center;padding:12px"><div class="stat-v" style="font-size:22px">${st.present}/${st.held}</div><div class="muted">Present</div></div></div>
    <div class="muted" style="margin-bottom:14px;text-align:center">Total = ${st.marks} competition marks + ${st.bonusTotal} attendance bonus (${Number(state.attendanceBonus)||0} per Sunday present)</div>
    <div style="margin-bottom:12px">
      ${fieldRow("Age",age==null?"":age)}
      ${fieldRow("Date of birth",m.dob?fmtDate(m.dob):"")}
      ${fieldRow("Joined scouting",m.joinDate?fmtDate(m.joinDate):"")}
      ${fieldRow("Email",m.email)}
      ${fieldRow("Contact",m.contact)}
      ${m.notes?fieldRow("Notes",m.notes):""}</div>
    <div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:4px">🏅 RANK BADGES</div>
    ${badgeList(m.rankBadges,"None recorded.")}
    <div style="font-size:12px;font-weight:700;color:var(--sub);margin:14px 0 4px">🎖️ PROFICIENCY BADGES</div>
    ${badgeList(m.proficiencyBadges,"None recorded.")}
    <div class="row" style="justify-content:flex-end;margin-top:18px">${canEdit?`<button class="btn" id="vEdit">✏️ Edit</button>`:""}<button class="btn btn-primary" id="vc">Close</button></div></div>`;
  document.body.appendChild(bg);bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.querySelector("#vx").onclick=()=>bg.remove();bg.querySelector("#vc").onclick=()=>bg.remove();
  if(bg.querySelector("#vEdit"))bg.querySelector("#vEdit").onclick=()=>{bg.remove();openMember(m);};
}

let mform=null;
function blankMember(){return{_k:uid(),id:nextId(),name:"",email:"",contact:"",memberType:"Scout",role:"",section:"Shaheen",patrol:"",dob:"",manualAge:"",joinDate:new Date().toISOString().slice(0,10),status:"Active",rankBadges:[],proficiencyBadges:[],notes:""};}
function openMember(m){mform=m?JSON.parse(JSON.stringify(m)):blankMember();drawMemberModal(!!m);}
function drawMemberModal(isEdit){
  const f=mform,isScout=f.memberType==="Scout",patrols=state.patrols[f.section]||[],rankCat=state.rankBadges[f.section]||[];
  const badgeBlock=(field,cat,label)=>`<div>
    <div class="row" style="justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:700;color:var(--sub)">${label}</span>
    <button class="btn" data-addbadge="${field}" style="padding:4px 10px;font-size:12.5px">＋ Add</button></div>
    ${cat.length?`<datalist id="dl_${field}">${cat.map(b=>`<option value="${esc(b)}">`).join("")}</datalist>`:""}
    <div id="bl_${field}">${badgeRows(field)}</div></div>`;
  const bg=document.createElement("div");bg.className="modal-bg";
  bg.innerHTML=`<div class="modal" style="max-width:600px">
    <div class="row" style="justify-content:space-between"><h2>${isEdit?"Edit member":"Add member"}</h2><button class="icon-btn" id="mx">✕</button></div>
    <div class="grid" style="gap:13px;margin-top:14px">
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:13px">
        <label><span class="lab">Member ID (auto)</span><input class="input mono" value="${esc(f.id)}" disabled style="background:var(--soft);color:var(--sub)"/></label>
        <label><span class="lab">Status</span><select class="input" data-f="status"><option ${f.status==="Active"?"selected":""}>Active</option><option ${f.status==="Inactive"?"selected":""}>Inactive</option></select></label></div>
      <label><span class="lab">Full name *</span><input class="input" data-f="name" value="${esc(f.name)}"/></label>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:13px">
        <label><span class="lab">Email</span><input class="input" data-f="email" value="${esc(f.email)}"/></label>
        <label><span class="lab">Contact</span><input class="input" data-f="contact" value="${esc(f.contact)}"/></label></div>

        <label><span class="lab">Section</span><select class="input" data-f="section">${SECTIONS.map(s=>`<option ${f.section===s.name?"selected":""}>${s.name}</option>`).join("")}</select></label></div>
      ${isScout?`<label><span class="lab">${sectionMeta(f.section).group} (patrol)</span><select class="input" data-f="patrol"><option value="">— select —</option>${patrols.map(p=>`<option ${f.patrol===p?"selected":""}>${esc(p)}</option>`).join("")}</select></label>`
        :`<label><span class="lab">Leadership role</span><select class="input" data-f="role"><option value="">— select —</option>${LEADER_ROLES.map(r=>`<option ${f.role===r?"selected":""}>${r}</option>`).join("")}</select></label>`}
      <div class="grid" style="grid-template-columns:1fr 1fr 1fr;gap:13px">
        <label><span class="lab">Date of birth</span><input class="input" type="date" data-f="dob" value="${esc(f.dob)}"/></label>
        <label><span class="lab">Age (if no DOB)</span><input class="input" data-f="manualAge" value="${f.dob?(ageFrom(f.dob)??""):esc(f.manualAge)}" ${f.dob?"disabled":""} placeholder="auto"/></label>
        <label><span class="lab">Joined scouting</span><input class="input" type="date" data-f="joinDate" value="${esc(f.joinDate)}"/></label></div>
      <div style="border-top:1px solid var(--line);padding-top:12px" class="grid">
        ${badgeBlock("rankBadges",rankCat,"RANK BADGES PASSED")}

      <label><span class="lab">Notes</span><textarea class="input" data-f="notes" style="min-height:56px;resize:vertical">${esc(f.notes)}</textarea></label></div>
    <div class="row" style="justify-content:flex-end;margin-top:18px"><button class="btn" id="mc">Cancel</button><button class="btn btn-primary" id="ms">💾 ${isEdit?"Save changes":"Add member"}</button></div></div>`;
  document.body.appendChild(bg);
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.querySelector("#mx").onclick=()=>bg.remove();bg.querySelector("#mc").onclick=()=>bg.remove();
  bg.querySelectorAll("[data-f]").forEach(el=>{el.oninput=()=>{mform[el.dataset.f]=el.value;};
    if(el.tagName==="SELECT")el.onchange=()=>{mform[el.dataset.f]=el.value;if(["memberType","section"].includes(el.dataset.f)){bg.remove();drawMemberModal(isEdit);}};});
  bindBadges(bg,isEdit);
  bg.querySelector("#ms").onclick=async()=>{
    if(!mform.name.trim())return toast("Name is required");
    if(!String(mform.id).trim()||state.members.some(m=>m._k!==mform._k&&String(m.id)===String(mform.id))){const fresh=nextId(mform._k);if(String(mform.id).trim())toast("ID "+mform.id+" was already used — assigned "+fresh);mform.id=fresh;}

function badgeRows(field){const arr=mform[field]||[];const dl=document.getElementById("dl_"+field)?"dl_"+field:"";

    <button class="icon-btn" data-brm="${field}:${i}" style="border:1px solid var(--line);border-radius:8px;color:var(--danger)">✕</button></div>`).join("");}
function bindBadges(bg,isEdit){
  bg.querySelectorAll("[data-addbadge]").forEach(b=>b.onclick=()=>{const f=b.dataset.addbadge;(mform[f]=mform[f]||[]).push({name:"",date:""});bg.querySelector("#bl_"+f).innerHTML=badgeRows(f);bindBadges(bg,isEdit);});
  bg.querySelectorAll("[data-bn]").forEach(el=>el.oninput=()=>{const[f,i]=el.dataset.bn.split(":");mform[f][i].name=el.value;});
  bg.querySelectorAll("[data-bd]").forEach(el=>el.oninput=()=>{const[f,i]=el.dataset.bd.split(":");mform[f][i].date=el.value;});
  bg.querySelectorAll("[data-brm]").forEach(b=>b.onclick=()=>{const[f,i]=b.dataset.brm.split(":");mform[f].splice(+i,1);bg.querySelector("#bl_"+f).innerHTML=badgeRows(f);bindBadges(bg,isEdit);});}
function confirmDel(m){const bg=document.createElement("div");bg.className="modal-bg";
  bg.innerHTML=`<div class="modal" style="max-width:380px;text-align:center"><div style="font-size:26px;margin-bottom:8px">🗑️</div>
    <h3>Remove ${esc(m.name)}?</h3><p class="muted" style="margin:0 0 18px">This permanently deletes the record.</p>
    <div class="row" style="justify-content:center"><button class="btn" id="k">Keep</button><button class="btn btn-danger" id="d">Delete</button></div></div>`;
  document.body.appendChild(bg);bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.querySelector("#k").onclick=()=>bg.remove();
  bg.querySelector("#d").onclick=async()=>{state.members=state.members.filter(x=>x._k!==m._k);await saveMembers();bg.remove();renderMembers();toast("Member removed");};}

/* ========================== attendance/marks ========================= */
let sDate=lastSunday(),sSec="Shaheen",sDraft={},sPat={},sAct="";
function scoutRoster(){return state.members.filter(m=>m.memberType==="Scout"&&m.section===sSec&&m.status==="Active").sort((a,b)=>String(a.patrol).localeCompare(String(b.patrol))||String(a.name).localeCompare(String(b.name)));}
function leaderRoster(){return state.members.filter(m=>m.memberType!=="Scout"&&m.section===sSec&&m.status==="Active").sort((a,b)=>String(a.name).localeCompare(String(b.name)));}
function renderSessions(){
  const scouts=scoutRoster(),leaders=leaderRoster(),all=[...scouts,...leaders];
  const existing=state.sessions[sDate+"|"+sSec];
  const patrols=state.patrols[sSec]||[];const gLabel=sectionMeta(sSec).group;
  sDraft={};all.forEach(m=>{const r=existing&&existing.records[m._k];sDraft[m._k]={present:r?r.present:true,points:r?r.points:""};});
  sPat={};patrols.forEach(p=>{sPat[p]=existing&&existing.patrolPoints&&existing.patrolPoints[p]!=null?existing.patrolPoints[p]:"";});
  sAct=existing&&existing.activity?existing.activity:"";
  const presBtn=m=>`<button class="btn pres" data-pk="${m._k}" ${canEdit?"":"disabled"} style="padding:5px 13px;font-size:13px"></button>`;
  const scoutRow=m=>`<tr><td style="font-weight:600">${esc(m.name)}</td><td style="color:var(--sub)">${esc(m.patrol||"—")}</td>
    <td>${presBtn(m)}</td><td><input class="input" type="number" data-mk="${m._k}" placeholder="0" style="width:80px;padding:6px 9px" value="${sDraft[m._k].points}" ${canEdit?"":"disabled"}/></td></tr>`;
  const leaderRow=m=>`<tr><td style="font-weight:600">${esc(m.name)} <span class="pill" style="background:var(--soft);color:var(--amber)">${esc(m.role||m.memberType)}</span></td>
    <td style="color:var(--sub)">${esc(m.memberType)}</td><td>${presBtn(m)}</td><td style="color:var(--sub)">—</td></tr>`;
  const subhead=t=>`<tr><td colspan="4" style="background:var(--soft);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--sub)">${t}</td></tr>`;
  let body="";
  if(scouts.length)body+=subhead("Scouts — individual marks")+scouts.map(scoutRow).join("");
  if(leaders.length)body+=subhead("Leaders — attendance only")+leaders.map(leaderRow).join("");
  $("#content").innerHTML=`
    ${canEdit?"":`<div class="banner">You're signed in as a Scout — this is view-only. Only leaders can record attendance and marks.</div>`}
    <div class="card" style="margin-bottom:14px">
      <div class="row" style="align-items:flex-end">
        <label><span class="lab">Sunday date</span><input id="sD" class="input" type="date" value="${sDate}"/></label>
        <label><span class="lab">Section</span><select id="sS" class="input">${SECTIONS.map(s=>`<option ${sSec===s.name?"selected":""}>${s.name}</option>`).join("")}</select></label>
        <label style="flex:1;min-width:160px"><span class="lab">Activity / competition (optional)</span><input id="sAct" class="input" value="${esc(sAct)}" placeholder="e.g. Knot relay, Drill" ${canEdit?"":"disabled"}/></label>
        <div class="muted" id="sCount"></div>
        ${canEdit?`<button class="btn btn-primary" id="sSave">💾 Save session</button>`:""}
        ${canDelete()&&existing?`<button class="btn btn-danger" id="sDel">🗑️ Delete</button>`:""}
      </div>
    </div>
    ${all.length?`<div class="tablewrap scrollx" style="margin-bottom:14px"><table><thead><tr>${["Name","Patrol / Type","Present","Marks"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${body}</tbody></table></div>`
      :`<div class="card" style="text-align:center;color:var(--sub);padding:40px;margin-bottom:14px">No active members in ${sSec}.</div>`}
    ${patrols.length?`<div class="card">
      <div style="font-weight:700;margin-bottom:4px">🏅 ${gLabel} competition — team marks</div>
      <div class="muted" style="margin-bottom:12px">A separate score you award to each ${gLabel.toLowerCase()} as a team (not the sum of individual marks).</div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">
        ${patrols.map(p=>`<label style="border:1px solid var(--line);border-radius:10px;padding:10px"><span class="lab">${esc(p)}</span>
          <input class="input" type="number" data-pp="${esc(p)}" placeholder="0" value="${sPat[p]}" ${canEdit?"":"disabled"}/></label>`).join("")}
      </div></div>`:""}
    <div class="muted" style="margin-top:10px">Each scout marked <b>present</b> automatically gets +${Number(state.attendanceBonus)||0} on their individual score. Individual marks feed Best ${sectionMeta(sSec).indiv}. ${gLabel} team marks feed Best ${gLabel}.</div>`;
  const refresh=()=>{const p=Object.values(sDraft).filter(v=>v.present).length;$("#sCount").textContent=`${p}/${all.length} present`+(existing?" · saved":"");};
  const paint=()=>{$("#content").querySelectorAll(".pres").forEach(b=>{const on=sDraft[b.dataset.pk].present;b.textContent=on?"Present":"Absent";b.style.background=on?"var(--activeBg)":"var(--offBg)";b.style.color=on?"var(--activeText)":"var(--offText)";b.style.border="none";});};
  $("#sD").onchange=e=>{sDate=e.target.value;renderSessions();};
  $("#sS").onchange=e=>{sSec=e.target.value;renderSessions();};
  if(canEdit){
    $("#sAct").oninput=e=>{sAct=e.target.value;};
    $("#content").querySelectorAll(".pres").forEach(b=>b.onclick=()=>{sDraft[b.dataset.pk].present=!sDraft[b.dataset.pk].present;paint();refresh();});
    $("#content").querySelectorAll("[data-mk]").forEach(i=>i.oninput=()=>{sDraft[i.dataset.mk].points=i.value;});
    $("#content").querySelectorAll("[data-pp]").forEach(i=>i.oninput=()=>{sPat[i.dataset.pp]=i.value;});
    $("#sSave").onclick=async()=>{
      const records={};Object.entries(sDraft).forEach(([k,v])=>{records[k]={present:!!v.present,points:Number(v.points)||0};});
      const patrolPoints={};Object.entries(sPat).forEach(([p,v])=>{patrolPoints[p]=Number(v)||0;});
      state.sessions[sDate+"|"+sSec]={date:sDate,section:sSec,activity:sAct,records,patrolPoints};
      await saveSessions();toast("Session saved");renderSessions();};
  }
  if(canDelete()&&existing&&$("#sDel"))$("#sDel").onclick=()=>confirmBox("Delete this session?",`Removes ${sSec} on ${fmtDate(sDate)}${sAct?' ('+sAct+')':''} and all its marks.`,async()=>{delete state.sessions[sDate+"|"+sSec];await saveSessions();renderSessions();toast("Session deleted");},"Delete",true);
  paint();refresh();
}

/* ============================ leaderboard ============================ */
let bSec="Shaheen",bFrom="",bTo="",bComp="All";
function renderBoard(){
  const sessionsAll=Object.values(state.sessions).filter(s=>s.section===bSec).filter(s=>(!bFrom||s.date>=bFrom)&&(!bTo||s.date<=bTo));
  const comps=[...new Set(sessionsAll.map(s=>s.activity||""))];
  if(bComp!=="All"&&!comps.includes(bComp))bComp="All";
  const sessions=bComp==="All"?sessionsAll:sessionsAll.filter(s=>(s.activity||"")===bComp);
  const scouts=state.members.filter(m=>m.memberType==="Scout"&&m.section===bSec);
  const bonus=Number(state.attendanceBonus)||0;
  const stat=scouts.map(m=>{let pts=0,pres=0;sessions.forEach(s=>{const r=s.records[m._k];if(r){pts+=Number(r.points)||0;if(r.present){pres++;pts+=bonus;}}});return{m,pts,pres,held:sessions.length};});
  const bestScouts=[...stat].sort((a,b)=>b.pts-a.pts);
  const counts={};(state.patrols[bSec]||[]).forEach(p=>counts[p]=0);
  scouts.forEach(m=>{if(m.patrol){counts[m.patrol]=(counts[m.patrol]||0)+1;}});
  const pa={};(state.patrols[bSec]||[]).forEach(p=>pa[p]=0);
  sessions.forEach(s=>{const pp=s.patrolPoints||{};Object.entries(pp).forEach(([p,v])=>{pa[p]=(pa[p]||0)+(Number(v)||0);});});
  const bestPatrols=Object.entries(pa).map(([name,pts])=>({name,pts,count:counts[name]||0})).sort((a,b)=>b.pts-a.pts);
  const maxI=bestScouts.length?bestScouts[0].pts:0,maxP=bestPatrols.length?bestPatrols[0].pts:0;
  const rc=i=>["#caa23a","#9aa3ad","#c08457"][i]||"#cfd6dd";
  const bar=(v,mx,c)=>`<div style="height:7px;background:var(--soft);border-radius:5px;overflow:hidden;margin-top:7px"><div style="height:100%;width:${mx>0?Math.max(3,Math.round(v/mx*100)):0}%;background:${c};border-radius:5px;transition:width .4s"></div></div>`;
  const row=(i,name,sub,val,mx,c)=>`<div style="padding:11px 12px;border-bottom:1px solid var(--line)">
    <div class="row" style="gap:12px"><div class="rank-no" style="background:${rc(i)}">${i+1}</div>
    <div style="flex:1;min-width:0"><div style="font-weight:600">${esc(name)}</div><div class="muted">${esc(sub)}</div></div>
    <div style="font-weight:800;font-size:19px;color:${c}">${val}</div></div>${bar(val,mx,c)}</div>`;
  const empty=`<div class="muted" style="text-align:center;padding:26px">No marks recorded for this range.</div>`;
  $("#content").innerHTML=`
    <div class="row" style="align-items:flex-end;margin-bottom:16px">
      <label><span class="lab">Section</span><select id="bS" class="input">${SECTIONS.map(s=>`<option ${bSec===s.name?"selected":""}>${s.name}</option>`).join("")}</select></label>
      <label><span class="lab">Competition</span><select id="bC" class="input" style="min-width:160px"><option value="All" ${bComp==="All"?"selected":""}>All competitions</option>${comps.map(c=>`<option value="${esc(c)}" ${bComp===c?"selected":""}>${esc(c||"(unnamed session)")}</option>`).join("")}</select></label>
      <label><span class="lab">From</span><input id="bF" class="input" type="date" value="${bFrom}"/></label>
      <label><span class="lab">To</span><input id="bT" class="input" type="date" value="${bTo}"/></label>
      <div class="muted" style="padding-bottom:9px">${sessions.length} session(s)${bComp!=="All"?` · ${esc(bComp||"unnamed")}`:""}</div></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr))">
      <div class="tablewrap"><div style="padding:13px 16px;border-bottom:1px solid var(--line);font-weight:700">⭐ Best ${sectionMeta(bSec).indiv} — individual</div><div>${bestScouts.length&&maxI>0?bestScouts.map((r,i)=>row(i,r.m.name,`${r.m.patrol||"—"} · present ${r.pres}/${r.held}`,r.pts,maxI,"var(--primary)")).join(""):empty}</div></div>
      <div class="tablewrap"><div style="padding:13px 16px;border-bottom:1px solid var(--line);font-weight:700">🏅 Best ${sectionMeta(bSec).group} — team</div><div>${bestPatrols.length&&maxP>0?bestPatrols.map((p,i)=>row(i,p.name,`${p.count} scout(s)`,p.pts,maxP,"var(--amber)")).join(""):empty}</div></div></div>`;
  $("#bS").onchange=e=>{bSec=e.target.value;bComp="All";renderBoard();};
  $("#bC").onchange=e=>{bComp=e.target.value;renderBoard();};
  $("#bF").onchange=e=>{bFrom=e.target.value;renderBoard();};
  $("#bT").onchange=e=>{bTo=e.target.value;renderBoard();};
}

      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr))">${ed.slice(3).map(([id,t])=>listEditor(t,id)).join("")}</div></div>

      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">

/* =========================== sunday planner ========================== */

          ${canEdit?`<div style="white-space:nowrap"><button class="icon-btn" data-pe="${it.id}">✏️</button>${canDelete()?`<button class="icon-btn" data-pd="${it.id}">🗑️</button>`:""}</div>`:""}
        </div></div>`;
      const head=(label,color,scope)=>`<div class="row" style="justify-content:space-between;margin:4px 0 8px"><span style="font-weight:700;color:${color}">${label}</span>${scope?`<button class="btn" data-wa="${esc(scope)}" style="background:#25D366;color:#fff;border:none;padding:4px 10px;font-size:12.5px">📲 Send to ${esc(scope)} group</button>`:""}</div>`;
      const block=(label,color,list,scope)=>list.length?head(label,color,scope)+`<div class="grid" style="gap:10px;margin-bottom:18px">${list.map(card).join("")}</div>`:"";
      let out=block("🎯 Group activity — all sections","var(--amber)",items.filter(it=>!it.section||it.section==="All"),null);
      SECTIONS.forEach(s=>{out+=block(s.name,s.color,items.filter(it=>it.section===s.name),s.name);});
      return out;
    })()}
    ${upcoming.length?`<div class="muted" style="margin-top:14px">Other planned Sundays: ${upcoming.map(d=>`<a href="#" data-jump="${d}">${fmtDate(d)}</a>`).join(" · ")}</div>`:""}`;
  $("#pD").onchange=e=>{pDate=e.target.value;renderPlanner();};
  $("#content").querySelectorAll("[data-jump]").forEach(a=>a.onclick=e=>{e.preventDefault();pDate=a.dataset.jump;renderPlanner();});
  $("#waAll").onclick=()=>sendWhatsApp("all");
  $("#pReport").onclick=()=>downloadPlanReport();
  $("#content").querySelectorAll("[data-wa]").forEach(b=>b.onclick=()=>sendWhatsApp(b.dataset.wa));
  if(canEdit){
    if($("#pAdd"))$("#pAdd").onclick=()=>openActivity(null);
    $("#content").querySelectorAll("[data-pe]").forEach(b=>b.onclick=()=>openActivity(plannerItems().find(x=>x.id==b.dataset.pe)));
    $("#content").querySelectorAll("[data-pd]").forEach(b=>b.onclick=async()=>{const d=state.activities[pDate];d.items=d.items.filter(x=>x.id!=b.dataset.pd);if(!d.items.length)delete state.activities[pDate];await saveActivities();renderPlanner();toast("Removed");});
  }
}
function planMessage(scope){
  const items=[...plannerItems()].sort((a,b)=>String(a.time).localeCompare(String(b.time)));
  const group=items.filter(it=>!it.section||it.section==="All");
  const fmtItem=it=>{let l=`• ${it.time?it.time+" ":""}${it.title}`;if(it.detail)l+=`\n   ${it.detail}`;if(it.lead)l+=`\n   👤 In charge: ${it.lead}`;return l;};
  const lines=[];
  if(scope==="all"){
    lines.push(`*${state.institution}*`,`🗓️ Sunday Plan — ${fmtDate(pDate)}`);
    const add=(label,list)=>{if(list.length){lines.push("",`*${label}*`);list.forEach(it=>lines.push(fmtItem(it)));}};
    add("🎯 Group — all sections",group);
    SECTIONS.forEach(s=>add(s.name,items.filter(it=>it.section===s.name)));
  }else{
    lines.push(`*${state.institution} — ${scope} Section*`,`🗓️ Sunday Plan — ${fmtDate(pDate)}`,"");
    items.filter(it=>it.section===scope).forEach(it=>lines.push(fmtItem(it)));
    if(group.length){lines.push("","*For all sections:*");group.forEach(it=>lines.push(fmtItem(it)));}
  }
  return lines.join("\n");
}
function sendWhatsApp(scope){
  if(!plannerItems().length)return toast("No activities to send");
  window.open("https://wa.me/?text="+encodeURIComponent(planMessage(scope)),"_blank");
}

function fixUrl(u){u=(u||"").trim();if(!u)return"";return /^https?:\/\//i.test(u)?u:"https://"+u;}

/* ================================ fees =============================== */
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let fYear=new Date().getFullYear(),fSec="Shaheen";
function feePaid(mk,ym){return!!(state.fees[mk]&&state.fees[mk][ym]);}
function renderFees(){
  const fee=Number(state.feeMonthly[fSec])||0;
  const scouts=state.members.filter(m=>m.memberType==="Scout"&&m.section===fSec&&m.status==="Active").sort((a,b)=>String(a.patrol).localeCompare(String(b.patrol))||String(a.name).localeCompare(String(b.name)));
  const ymOf=i=>`${fYear}-${String(i+1).padStart(2,"0")}`;
  const rowPaid=mk=>MONTHS.reduce((n,_,i)=>n+(feePaid(mk,ymOf(i))?1:0),0);
  const cellStyle=p=>`width:30px;height:28px;border-radius:6px;border:1px solid var(--line);cursor:pointer;font-size:13px;background:${p?"var(--activeBg)":"#fff"};color:${p?"var(--activeText)":"var(--sub)"}`;
  const cell=(mk,i)=>{const p=feePaid(mk,ymOf(i));return `<td style="padding:4px;text-align:center"><button class="fcell" id="fc_${mk}_${i}" data-mk="${mk}" data-i="${i}" style="${cellStyle(p)}">${p?"✓":""}</button></td>`;};
  const body=scouts.map(m=>{const rp=rowPaid(m._k);return `<tr>
    <td style="padding:6px 10px;font-weight:600;white-space:nowrap">${esc(m.name)}<div class="muted">${esc(m.patrol||"")}</div></td>
    ${MONTHS.map((_,i)=>cell(m._k,i)).join("")}
    <td style="padding:6px 10px;text-align:right;white-space:nowrap;color:var(--primaryDark)"><b id="rp_${m._k}">Rs ${rp*fee}</b><div class="muted" id="rc_${m._k}">${rp}/12</div></td>
    <td style="padding:6px 10px;text-align:right;white-space:nowrap;color:var(--danger)"><b id="rd_${m._k}">Rs ${(12-rp)*fee}</b><div class="muted">due</div></td>
    <td style="padding:6px 10px;text-align:center"><button class="payall" data-mk="${m._k}" style="background:var(--primary);color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:12.5px;cursor:pointer;white-space:nowrap">${rp===12?"Clear":"Pay all"}</button></td>
  </tr>`;}).join("");
  const collected=scouts.reduce((s,m)=>s+rowPaid(m._k)*fee,0);
  const outstanding=scouts.reduce((s,m)=>s+(12-rowPaid(m._k))*fee,0);
  $("#content").innerHTML=`
    <div class="card row" style="align-items:flex-end;margin-bottom:14px">
      <label><span class="lab">Year</span><input id="fY" class="input" type="number" value="${fYear}" style="width:100px"/></label>
      <label><span class="lab">Section</span><select id="fS" class="input">${SECTIONS.map(s=>`<option ${fSec===s.name?"selected":""}>${s.name}</option>`).join("")}</select></label>
      <div style="flex:1"></div>
      <div style="text-align:right"><div class="muted">Monthly fee</div><div style="font-weight:700;font-size:18px">Rs ${fee}</div></div>
    </div>
    ${scouts.length?`<div class="tablewrap scrollx"><table style="font-size:13px"><thead><tr>
      <th style="padding:8px 10px">Scout</th>${MONTHS.map(m=>`<th style="padding:8px 4px;text-align:center">${m}</th>`).join("")}<th style="padding:8px 10px;text-align:right">Paid</th><th style="padding:8px 10px;text-align:right">Due</th><th style="padding:8px 10px;text-align:center">Action</th></tr></thead>
      <tbody>${body}</tbody></table></div>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:12px;margin-top:14px">
        <div class="card"><div class="muted">Total collected — ${fSec} ${fYear}</div><div style="font-weight:800;font-size:24px;color:var(--primaryDark)" id="feeTotal">Rs ${collected}</div></div>
        <div class="card"><div class="muted">Total outstanding (full year)</div><div style="font-weight:800;font-size:24px;color:var(--danger)" id="feeOut">Rs ${outstanding}</div></div></div>
      <div class="muted" style="margin-top:10px">Tap a month to mark it paid (✓). “Pay all” marks the whole year. Due = unpaid months × Rs ${fee}.</div>`
      :`<div class="card" style="text-align:center;color:var(--sub);padding:40px">No active scouts in ${fSec}.</div>`}`;
  $("#fY").onchange=e=>{fYear=Number(e.target.value)||fYear;renderFees();};
  $("#fS").onchange=e=>{fSec=e.target.value;renderFees();};
  const gid=id=>document.getElementById(id);
  const recalc=()=>{let tot=0,out=0;scouts.forEach(m=>{const rp=rowPaid(m._k);tot+=rp*fee;out+=(12-rp)*fee;const a=gid("rp_"+m._k);if(a)a.textContent="Rs "+rp*fee;const c=gid("rc_"+m._k);if(c)c.textContent=rp+"/12";const d=gid("rd_"+m._k);if(d)d.textContent="Rs "+(12-rp)*fee;});const ft=gid("feeTotal");if(ft)ft.textContent="Rs "+tot;const fo=gid("feeOut");if(fo)fo.textContent="Rs "+out;};
  const paintCell=(mk,i)=>{const b=gid("fc_"+mk+"_"+i);if(!b)return;const p=feePaid(mk,ymOf(i));b.textContent=p?"✓":"";b.style.cssText=cellStyle(p);};
  $("#content").querySelectorAll(".fcell").forEach(b=>b.onclick=async()=>{
    const mk=b.dataset.mk,i=Number(b.dataset.i),ym=ymOf(i);state.fees[mk]=state.fees[mk]||{};
    if(state.fees[mk][ym])delete state.fees[mk][ym];else state.fees[mk][ym]=true;
    paintCell(mk,i);recalc();await saveFees();});
  $("#content").querySelectorAll(".payall").forEach(b=>b.onclick=async()=>{
    const mk=b.dataset.mk;const allPaid=rowPaid(mk)===12;state.fees[mk]=state.fees[mk]||{};
    MONTHS.forEach((_,i)=>{const ym=ymOf(i);if(allPaid)delete state.fees[mk][ym];else state.fees[mk][ym]=true;});
    MONTHS.forEach((_,i)=>paintCell(mk,i));b.textContent=allPaid?"Pay all":"Clear";recalc();await saveFees();});
}

/* ============================== reports ============================= */
let rYear=new Date().getFullYear(),rQ=Math.floor(new Date().getMonth()/3)+1,rMode="quarter",rFrom="",rTo="";
function quarterRange(y,q){const t=[["01-01","03-31","Jan–Mar"],["04-01","06-30","Apr–Jun"],["07-01","09-30","Jul–Sep"],["10-01","12-31","Oct–Dec"]][q-1];return{from:y+"-"+t[0],to:y+"-"+t[1],label:`Quarter ${q} · ${t[2]} ${y}`};}
function reportRange(){return rMode==="custom"?{from:rFrom,to:rTo,label:`${rFrom?fmtDate(rFrom):"…"} to ${rTo?fmtDate(rTo):"…"}`}:quarterRange(rYear,rQ);}
const PROGRAM_SECTIONS=["Group","Shaheen","Boy Scout","Rover"];

function progsIn(rg){const inR=d=>d&&(!rg.from||d>=rg.from)&&(!rg.to||d<=rg.to);return (state.programs||[]).filter(p=>inR(p.startDate));}

      <td style="${td}">${esc(p.venue)}</td><td style="${td}">${esc(p.month)}</td>

      <td style="${td}">${esc(p.participation)}</td><td style="${td}">${esc(p.female)}</td><td style="${td}">${esc(p.ageGroup)}</td></tr>`).join("")
      :`<tr><td style="${td}" colspan="12">No programmes recorded.</td></tr>`;
    return `<h3 style="margin:16px 0 6px;color:#4e2681">${sec}</h3>
      <table style="border-collapse:collapse;width:100%"><thead><tr>${cols.map(c=>`<th style="${th}">${c}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table>`;
  };
  return `
    <div style="text-align:center">
      <h1 style="margin:0;font-size:18px">${esc(state.institution)}</h1>

    ${PROGRAM_SECTIONS.map(secTable).join("")}
    <div style="margin-top:22px;font-size:12px;color:#555">Group Scout Leader: __________________________   Signature: __________________________</div>`;
}
function reportDoc(body){return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>KSG Programme Report</title>
  <style>@page{size:A4 landscape;margin:10mm} body{font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;margin:0 auto;padding:18px;line-height:1.3}
  table{page-break-inside:auto} tr{page-break-inside:avoid}
  @media print{.noprint{display:none}}</style></head>
  <body><button class="noprint" onclick="window.print()" style="float:right;background:#6a34a9;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:600;cursor:pointer">🖨️ Print / Save as PDF</button>${body}</body></html>`;}
function renderReports(){
  const rg=reportRange();const list=progsIn(rg);
  const secList=sec=>{const rows=list.filter(p=>p.section===sec);const col=sec==="Group"?"#6a34a9":sectionMeta(sec).color;
    return `<div style="margin-bottom:6px"><div style="font-weight:700;color:${col};margin:10px 0 4px">${sec} <span class="muted">(${rows.length})</span></div>
      ${rows.length?`<div class="tablewrap scrollx"><table style="font-size:13px"><thead><tr><th>#</th><th>Programme</th><th>Month</th><th>Type</th><th>Part.</th><th>Female</th><th>Age</th><th></th></tr></thead><tbody>
        ${rows.map((p,i)=>`<tr><td>${i+1}</td><td style="font-weight:600">${esc(p.name)}</td><td>${esc(p.month)}</td><td>${esc(p.type)}</td><td>${esc(p.participation)}</td><td>${esc(p.female)}</td><td>${esc(p.ageGroup)}</td>
          <td style="text-align:right;white-space:nowrap">${canEdit?`<button class="icon-btn" data-pe="${p.id}">✏️</button>`:""}${canDelete()?`<button class="icon-btn" data-pd="${p.id}">🗑️</button>`:""}</td></tr>`).join("")}
      </tbody></table></div>`:`<div class="muted" style="padding:2px 0 6px">No programmes in this period.</div>`}</div>`;};
  $("#content").innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <div class="row" style="align-items:flex-end">
        <label><span class="lab">Period</span><select id="rMode" class="input"><option value="quarter" ${rMode==="quarter"?"selected":""}>Quarter</option><option value="custom" ${rMode==="custom"?"selected":""}>Custom dates</option></select></label>
        ${rMode==="quarter"?`
          <label><span class="lab">Year</span><input id="rYear" class="input" type="number" value="${rYear}" style="width:100px"/></label>
          <label><span class="lab">Quarter</span><select id="rQ" class="input">${[1,2,3,4].map(q=>`<option value="${q}" ${rQ===q?"selected":""}>Q${q}</option>`).join("")}</select></label>`
        :`<label><span class="lab">From</span><input id="rFrom" class="input" type="date" value="${rFrom}"/></label>
          <label><span class="lab">To</span><input id="rTo" class="input" type="date" value="${rTo}"/></label>`}
        <div style="flex:1"></div>
        ${canEdit?`<button class="btn btn-primary" id="addProg">＋ Add programme</button>`:""}
      </div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="row" style="justify-content:space-between;margin-bottom:4px"><b>Programmes — ${esc(rg.label)}</b>
        <div class="row" style="gap:8px"><button class="btn" id="rPrint">🖨️ Print / Save PDF</button><button class="btn" id="rDl">⬇️ Download</button></div></div>
      ${PROGRAM_SECTIONS.map(secList).join("")}
    </div>
    <div class="muted" style="margin-bottom:8px">Report preview</div>
    <div class="card" style="background:#fff;overflow-x:auto">${buildReportBody(rg)}</div>`;
  $("#rMode").onchange=e=>{rMode=e.target.value;renderReports();};
  if($("#rYear"))$("#rYear").onchange=e=>{rYear=Number(e.target.value)||rYear;renderReports();};
  if($("#rQ"))$("#rQ").onchange=e=>{rQ=Number(e.target.value);renderReports();};
  if($("#rFrom"))$("#rFrom").onchange=e=>{rFrom=e.target.value;renderReports();};
  if($("#rTo"))$("#rTo").onchange=e=>{rTo=e.target.value;renderReports();};
  if($("#addProg"))$("#addProg").onclick=()=>openProgram(null);
  $("#content").querySelectorAll("[data-pe]").forEach(b=>b.onclick=()=>openProgram(state.programs.find(x=>x.id==b.dataset.pe)));
  $("#content").querySelectorAll("[data-pd]").forEach(b=>b.onclick=()=>{const p=state.programs.find(x=>x.id==b.dataset.pd);confirmBox("Delete programme?",`Removes "${p.name}".`,async()=>{state.programs=state.programs.filter(x=>x.id!==p.id);await savePrograms();renderReports();toast("Deleted");},"Delete",true);});
  $("#rPrint").onclick=()=>{const w=window.open("","_blank");if(!w)return toast("Allow pop-ups to print");w.document.write(reportDoc(buildReportBody(reportRange())));w.document.close();};
  $("#rDl").onclick=()=>{const rg2=reportRange();download(reportDoc(buildReportBody(rg2)),`KSG_programme_report_${(rg2.label||"").replace(/[^a-z0-9]+/gi,"_")}.html`,"text/html");};
}
function openProgram(p){
  const isEdit=!!p;const f=p?{...p}:{id:uid(),section:"Group",name:"",portfolio:"",venue:"",month:"",startDate:"",endDate:"",duration:"",type:"Physical",participation:"",female:"",ageGroup:""};
  const bg=document.createElement("div");bg.className="modal-bg";
  bg.innerHTML=`<div class="modal" style="max-width:620px">
    <div class="row" style="justify-content:space-between"><h2>${isEdit?"Edit programme":"Add programme"}</h2><button class="icon-btn" id="px">✕</button></div>
    <div class="grid" style="gap:12px;margin-top:14px">
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:12px">
        <label><span class="lab">Section</span><select class="input" id="pf_section">${PROGRAM_SECTIONS.map(s=>`<option ${f.section===s?"selected":""}>${s}</option>`).join("")}</select></label>
        <label><span class="lab">Program Type</span><select class="input" id="pf_type">${PTYPES.map(t=>`<option ${f.type===t?"selected":""}>${t}</option>`).join("")}</select></label>
      </div>
      <label><span class="lab">Name of Programme *</span><input class="input" id="pf_name" value="${esc(f.name)}"/></label>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:12px">
        <label><span class="lab">Portfolio / Board</span><input class="input" id="pf_portfolio" value="${esc(f.portfolio)}"/></label>
        <label><span class="lab">Venue</span><input class="input" id="pf_venue" value="${esc(f.venue)}"/></label>
      </div>
      <div class="grid" style="grid-template-columns:1fr 1fr 1fr;gap:12px">
        <label><span class="lab">Month</span><select class="input" id="pf_month"><option value="">—</option>${MONTHS.map(m=>`<option ${f.month===m?"selected":""}>${m}</option>`).join("")}</select></label>
        <label><span class="lab">Start Date</span><input class="input" type="date" id="pf_startDate" value="${esc(f.startDate)}"/></label>
        <label><span class="lab">End Date</span><input class="input" type="date" id="pf_endDate" value="${esc(f.endDate)}"/></label>
      </div>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:12px">
        <label><span class="lab">Duration of Programme</span><input class="input" id="pf_duration" value="${esc(f.duration)}" placeholder="e.g. 2 hours / 3 days"/></label>
        <label><span class="lab">Age Group</span><input class="input" id="pf_ageGroup" value="${esc(f.ageGroup)}" placeholder="e.g. 12–17"/></label>
      </div>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:12px">
        <label><span class="lab">No. of Participation</span><input class="input" type="number" id="pf_participation" value="${esc(f.participation)}"/></label>
        <label><span class="lab">Female Participation</span><input class="input" type="number" id="pf_female" value="${esc(f.female)}"/></label>
      </div>
    </div>
    <div class="row" style="justify-content:flex-end;margin-top:18px"><button class="btn" id="pc">Cancel</button><button class="btn btn-primary" id="ps">💾 Save</button></div></div>`;
  document.body.appendChild(bg);bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.querySelector("#px").onclick=()=>bg.remove();bg.querySelector("#pc").onclick=()=>bg.remove();
  bg.querySelector("#ps").onclick=async()=>{
    const g=id=>bg.querySelector("#pf_"+id).value;
    const v={id:f.id,section:g("section"),type:g("type"),name:g("name").trim(),portfolio:g("portfolio"),venue:g("venue"),month:g("month"),startDate:g("startDate"),endDate:g("endDate"),duration:g("duration"),ageGroup:g("ageGroup"),participation:g("participation"),female:g("female")};
    if(!v.name)return toast("Programme name is required");
    state.programs=isEdit?state.programs.map(x=>x.id===v.id?v:x):[...(state.programs||[]),v];
    await savePrograms();bg.remove();renderReports();toast("Saved");
  };
}

/* ============================== boot ================================= */
boot();
</script>
</body>
</html>
